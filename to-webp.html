<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<title>WebP変換 無料・高画質・オンラインで簡単</title>

<meta name="description" content="JPGやPNG画像をWebPに無料で変換できるツールです。高画質のまま軽量化でき、スマホ・PC対応。インストール不要で簡単に使えます。">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: sans-serif;
  text-align: center;
  padding: 20px;
}

h1, h2 {
  margin-top: 30px;
}

#drop {
  border: 2px dashed #999;
  padding: 40px;
  margin: 20px auto;
  max-width: 300px;
  cursor: pointer;
}

#drop:hover {
  background: #f5f5f5;
}

input, button {
  margin: 10px;
  padding: 10px;
}

img {
  max-width: 200px;
  margin: 10px;
}

.section {
  max-width: 700px;
  margin: auto;
  text-align: left;
}

.download-btn {
  display: block;
  margin: 5px auto;
}
</style>
</head>

<body>

<h1>WebP変換ツール</h1>

<p>JPG・PNG画像をWebPに変換できる無料ツールです。</p>

<div id="drop">ここに画像をドラッグ</div>

<input type="file" id="upload" accept="image/png,image/jpeg" multiple>
<br>

<label>画質</label><br>
<input type="range" id="quality" min="0.1" max="1" step="0.1" value="0.8">
<p id="qval">0.8</p>

<input type="text" id="filename" placeholder="ファイル名（空欄なら元の名前）">

<br>
<button onclick="convert()">変換する</button>

<div id="result"></div>

<div class="section">

<h2>WebPに変換する方法</h2>
<p>
このツールでは、JPGやPNG画像を簡単にWebP形式に変換できます。
WebPは高画質のままファイルサイズを小さくできる画像形式です。
</p>

<h2>WebPのメリット</h2>
<ul>
<li>ファイルサイズが小さい</li>
<li>Web表示が高速になる</li>
<li>SEOにも有利</li>
</ul>

<h2>よくある質問</h2>
<p><b>Q. 無料で使えますか？</b><br>はい、完全無料です。</p>
<p><b>Q. スマホでも使えますか？</b><br>はい、使用可能です。</p>

</div>

<div class="section">
<h2>関連ツール</h2>
<a href="png-to-jpg.html">PNG→JPG変換</a><br>
<a href="jpg-to-png.html">JPG→PNG変換</a><br>
<a href="image-compress.html">画像圧縮</a><br>
<a href="index.html">トップページ</a>
</div>

<script>

const drop = document.getElementById("drop");
const q = document.getElementById("quality");
const qval = document.getElementById("qval");

q.oninput = () => qval.innerText = q.value;

drop.addEventListener("dragover", e => {
  e.preventDefault();
  drop.style.background = "#eee";
});

drop.addEventListener("dragleave", () => {
  drop.style.background = "";
});

drop.addEventListener("drop", e => {
  e.preventDefault();
  document.getElementById("upload").files = e.dataTransfer.files;
  drop.style.background = "";
});

function convert() {

  const files = document.getElementById("upload").files;
  if (files.length === 0) return alert("画像を選択してください");

  const quality = parseFloat(q.value);
  const nameInput = document.getElementById("filename").value.trim();
  const result = document.getElementById("result");
  result.innerHTML = "";

  Array.from(files).forEach((file, index) => {

    const img = new Image();
    const reader = new FileReader();

    reader.onload = e => img.src = e.target.result;

    img.onload = () => {

      const canvas = document.createElement("canvas");
      canvas.width = img.width;
      canvas.height = img.height;

      const ctx = canvas.getContext("2d");

      ctx.drawImage(img, 0, 0);

      const webp = canvas.toDataURL("image/webp", quality);

      const preview = document.createElement("img");
      preview.src = webp;
      preview.alt = "WebP変換後の画像";

      const link = document.createElement("a");

      let filename;

      if (nameInput) {
        filename = nameInput.replace(/\.webp$/i, "") + "_" + (index+1);
      } else {
        filename = file.name.replace(/\..+$/, "");
      }

      link.href = webp;
      link.download = filename + ".webp";
      link.innerText = filename + ".webp をダウンロード";
      link.className = "download-btn";

      result.appendChild(preview);
      result.appendChild(link);

    };

    reader.readAsDataURL(file);

  });

}

</script>

</body>
</html>
